{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div class="barra-superior"><a>&#128274; Cambiar Contraseña</a><a href="{{ url_for('dashboard.dashboard_negocio') }}">Atrás</a></div>
<div class="contenedor"><div class="tarjeta"><h3>Cambia tu contraseña</h3>
{% with mensajes = get_flashed_messages() %}{% if mensajes %}<div class="alerta">{{ mensajes[0] }}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="campo"><label>Contraseña actual</label><input type="password" name="actual" class="control" required></div>
<div class="campo"><label>Nueva contraseña</label><input type="password" name="nueva" class="control" required></div>
<div class="campo"><label>Confirmar nueva contraseña</label><input type="password" name="confirmacion" class="control" required></div>
<button type="submit" class="btn">Actualizar</button></form></div></div>
{% endblock %}
