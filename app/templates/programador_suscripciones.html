{% extends "base.html" %}
{% block title %}Suscripciones{% endblock %}
{% block content %}
<div class="barra-superior"><a>&#128179; Suscripciones</a><a href="{{ url_for('dashboard.seleccionar_negocio') }}">Volver</a></div>
<div class="contenedor"><h3>Negocios</h3>
{% for s in suscripciones %}<div class="tarjeta"><p><strong>{{ s[1] }}</strong></p>
<form method="POST"><input type="hidden" name="accion" value="actualizar"><input type="hidden" name="negocio_id" value="{{ s[0] }}">
    <select name="periodicidad" class="control"><option value="diario" {% if s[2]=='diario' %}selected{% endif %}>Diario</option><option value="semanal" {% if s[2]=='semanal' %}selected{% endif %}>Semanal</option><option value="mensual" {% if s[2]=='mensual' %}selected{% endif %}>Mensual</option><option value="anual" {% if s[2]=='anual' %}selected{% endif %}>Anual</option></select>
    <select name="metodo_cobro" class="control"><option value="transferencia" {% if s[3]=='transferencia' %}selected{% endif %}>Transferencia</option><option value="pago_movil" {% if s[3]=='pago_movil' %}selected{% endif %}>Pago Móvil</option><option value="efectivo" {% if s[3]=='efectivo' %}selected{% endif %}>Efectivo</option></select>
    <select name="moneda" class="control"><option value="USD" {% if s[4]=='USD' %}selected{% endif %}>USD</option><option value="VES" {% if s[4]=='VES' %}selected{% endif %}>VES</option></select>
    <input type="number" step="0.01" name="monto_cobro" class="control" value="{{ "%.2f"|format(s[5]) }}" placeholder="Monto">
    <label>Activa <input type="checkbox" name="activa" value="1" {% if s[6] %}checked{% endif %}></label>
    <button type="submit" class="btn">Guardar</button>
</form></div>{% endfor %}</div>
{% endblock %}
